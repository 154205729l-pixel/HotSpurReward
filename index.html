<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热刺挽救计划</title>
<style>
@font-face{font-family:'PixelFont';src:url('https://fonts.gstatic.com/s/pressstart2p/v15/e3t4euO8T-267oIAQAu6jDQyK3nVivM.woff2') format('woff2')}
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Press Start 2P','Courier New',monospace;background:#d0daf5;color:#1e293b;min-height:100vh;image-rendering:pixelated;font-size:20px;line-height:1.9;font-weight:bold}
.container{max-width:820px;margin:0 auto;padding:20px;position:relative}
.header{text-align:center;padding:30px 0 20px}
.header h1{font-size:2em;color:#132044;margin-bottom:8px;text-shadow:3px 3px 0 #c8a84b}
.header .subtitle{color:#2563eb;font-size:1em}
.logo{font-size:2.5em;margin-bottom:10px}
.panel{background:#ffffff;padding:20px;margin-bottom:16px;border:3px solid #132044;box-shadow:6px 6px 0 #132044;border-radius:0}
.panel h2{color:#132044;font-size:1.2em;margin-bottom:12px;border-bottom:3px solid #c8a84b;padding-bottom:8px}
.stats-row{display:flex;justify-content:space-around;text-align:center;flex-wrap:wrap;gap:8px}
.stat-box{background:#ffffff;padding:10px 12px;min-width:90px;flex:1;border:2px solid #132044;box-shadow:3px 3px 0 #132044;display:flex;align-items:center;justify-content:center;gap:8px}
.stat-box .num{font-size:1.3em;font-weight:bold;color:#132044}
.stat-box .label{font-size:0.8em;color:#64748b}
.stat-box.danger .num{color:#dc2626}
.stat-box.safe .num{color:#16a34a}
.stat-box.warn .num{color:#d97706}
.event-card{background:#fffdf5;padding:16px;margin-bottom:12px;border:3px solid #132044;border-left:6px solid #c8a84b;box-shadow:4px 4px 0 #c8a84b}
.event-card .event-title{font-size:1.3em;color:#132044;margin-bottom:8px}
.event-card .event-desc{color:#475569;font-size:1.05em;line-height:2}
.choices{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.choice-btn{background:#f8faff;border:3px solid #132044;color:#1e293b;padding:16px 20px;cursor:pointer;text-align:left;font-size:1.05em;font-family:'Press Start 2P','Courier New',monospace;transition:all 0.15s ease;border-radius:0;box-shadow:3px 3px 0 #132044}
.choice-btn:hover{background:#eff6ff;border-color:#2563eb;transform:translate(-2px,-2px);box-shadow:5px 5px 0 #2563eb}
.choice-btn.selected{background:#fffbeb;border-color:#c8a84b;box-shadow:4px 4px 0 #c8a84b}
.choice-btn .choice-label{font-weight:bold;color:#132044;font-size:1.1em}
.choice-btn .choice-desc{font-size:1em;color:#475569;margin-top:6px}
.match-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.match-info{font-size:0.9em;color:#64748b}
.opponent-name{font-size:1.3em;font-weight:bold;color:#132044}
.result-box{text-align:center;padding:24px}
.score{font-size:2.5em;font-weight:bold;margin:12px 0}
.win{color:#16a34a}.draw{color:#d97706}.loss{color:#dc2626}
.score.win{text-shadow:0 0 20px rgba(22,163,74,0.4)}.score.draw{text-shadow:0 0 20px rgba(217,119,6,0.4)}.score.loss{text-shadow:0 0 20px rgba(220,38,38,0.4)}
.result-box.res-win{border-top:4px solid #16a34a}.result-box.res-draw{border-top:4px solid #d97706}.result-box.res-loss{border-top:4px solid #dc2626}
.btn-next{background:#132044;color:#ffffff;border:3px solid #0a1530;padding:16px 40px;font-size:1em;cursor:pointer;font-family:'Press Start 2P','Courier New',monospace;display:inline-block;margin-top:12px;box-shadow:4px 4px 0 #0a1530;border-radius:0;transition:all 0.15s ease}
.btn-next:hover{background:#1e3a6e;transform:translate(-2px,-2px);box-shadow:6px 6px 0 #0a1530}
.btn-confirm{background:#c8a84b;color:#132044;border:3px solid #8a6e20;padding:14px 36px;font-size:1em;cursor:pointer;font-family:'Press Start 2P','Courier New',monospace;margin-top:12px;box-shadow:4px 4px 0 #8a6e20;border-radius:0;transition:all 0.15s ease}
.btn-confirm:hover{background:#dbb84e;transform:translate(-2px,-2px);box-shadow:6px 6px 0 #8a6e20}
.btn-start{background:#2563eb;color:#ffffff;border:3px solid #1d4ed8;padding:18px 48px;font-size:1.1em;cursor:pointer;font-family:'Press Start 2P','Courier New',monospace;margin-top:20px;box-shadow:5px 5px 0 #1d4ed8;border-radius:0;transition:all 0.15s ease}
.btn-start:hover{background:#3b82f6;transform:translate(-2px,-2px);box-shadow:7px 7px 0 #1d4ed8}
table{width:100%;border-collapse:collapse;font-size:0.9em}
th{background:#132044;color:#c8a84b;padding:10px 8px;text-align:left;border:2px solid #132044}
td{padding:9px 8px;border:2px solid #e2e8f0;background:#ffffff}
tr.spurs{font-weight:bold}
tr.spurs td{color:#c8a84b;background:#132044;border-left:4px solid #c8a84b}
tr.relegation td{background:#fef2f2;color:#dc2626}
tr.ucl td{background:#f0fdf4}
tr.uel td{background:#eff6ff}
tr.zone-line td{border-bottom:3px solid #dc2626}
tr.ucl-line td{border-bottom:3px solid #16a34a}
tr.uel-line td{border-bottom:3px solid #2563eb}
.zone-tag{font-size:0.7em;padding:2px 6px;border-radius:0;margin-left:4px;display:inline-block}
.zone-tag.ucl{background:#16a34a;color:#fff}
.zone-tag.uel{background:#2563eb;color:#fff}
.zone-tag.rel{background:#dc2626;color:#fff}
.table-scroll{overflow-x:auto;overflow-y:auto;max-height:320px;-webkit-overflow-scrolling:touch;border:2px solid #132044}
.table-scroll table{margin:0}
.table-scroll thead th{position:sticky;top:0;z-index:1;background:#132044}
td.num-cell{text-align:center}
th.num-cell{text-align:center}
.final-result{text-align:center;padding:30px 16px}
.final-result h2{font-size:1.7em;margin-bottom:16px}
.final-result .survived{color:#16a34a;text-shadow:2px 2px 0 #bbf7d0}
.final-result .relegated{color:#dc2626;text-shadow:2px 2px 0 #fecaca}
.final-result p{font-size:1em;color:#475569;line-height:2.2;margin-bottom:8px}
.morale-bar{height:12px;background:#e2e8f0;border:2px solid #132044;margin-top:8px;overflow:hidden}
.morale-fill{height:100%;transition:width 0.5s}
.watermark{position:fixed;opacity:0.08;pointer-events:none;z-index:9999;color:#132044;font-size:1em;font-family:'Press Start 2P',monospace;white-space:nowrap}
.wm1{top:8%;left:3%;transform:rotate(-20deg)}
.wm2{top:20%;right:3%;transform:rotate(15deg)}
.wm3{top:35%;left:20%;transform:rotate(-10deg)}
.wm4{top:50%;right:10%;transform:rotate(20deg)}
.wm5{top:63%;left:5%;transform:rotate(-15deg)}
.wm6{top:75%;right:25%;transform:rotate(10deg)}
.wm7{top:88%;left:45%;transform:rotate(-20deg)}
.wm8{top:42%;left:55%;transform:rotate(15deg)}
.fade-in{animation:fadeIn 0.3s ease-in}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.coach-tag{display:inline-block;background:#eff6ff;border:2px solid #2563eb;padding:6px 14px;font-size:0.9em;color:#2563eb;margin-top:8px}
.sel-info{background:#fffbeb;border:2px solid #c8a84b;padding:14px 18px;margin-top:12px;color:#475569;font-size:0.95em}
.sel-info span{color:#c8a84b;font-weight:bold}
.confirm-area{text-align:center;margin-top:12px}
.coach-input{background:#ffffff;border:3px solid #132044;color:#1e293b;padding:12px 16px;font-size:1em;font-family:'Press Start 2P','Courier New',monospace;text-align:center;box-shadow:3px 3px 0 #132044;flex:1;min-width:0}
.coach-input:focus{outline:none;border-color:#2563eb;box-shadow:3px 3px 0 #2563eb}
.coach-input::placeholder{color:#94a3b8;font-size:0.8em}
.name-section{text-align:center;margin:20px 0 10px}
.name-section label{color:#132044;font-size:0.9em;display:block;margin-bottom:10px}
.name-row{display:flex;align-items:center;justify-content:center;gap:8px;max-width:420px;margin:10px auto}
.dice-btn{background:#c8a84b;border:3px solid #132044;color:#fff;font-size:1.4em;width:52px;height:52px;cursor:pointer;box-shadow:3px 3px 0 #132044;display:flex;align-items:center;justify-content:center;transition:all 0.15s ease;flex-shrink:0}
.dice-btn:hover{background:#d4b85c;transform:translateY(-2px);box-shadow:3px 5px 0 #132044}
.dice-btn:active{transform:translateY(1px);box-shadow:2px 2px 0 #132044}
.dice-btn.rolling{animation:diceRoll 0.4s ease}
@keyframes diceRoll{0%{transform:rotate(0deg) scale(1)}25%{transform:rotate(90deg) scale(1.2)}50%{transform:rotate(180deg) scale(1)}75%{transform:rotate(270deg) scale(1.2)}100%{transform:rotate(360deg) scale(1)}}

@media(max-width:768px){
  body{font-size:15px}
  .container{padding:12px}
  .header{padding:20px 0 15px}
  .header h1{font-size:1.5em}
  .header .subtitle{font-size:0.85em}
  .logo{font-size:2em}
  .panel{padding:16px;border-width:3px;box-shadow:4px 4px 0 #132044}
  .panel h2{font-size:1.05em}
  .stats-row{gap:6px;flex-wrap:wrap}
  .stat-box{padding:10px 8px;min-width:45%}
  .stat-box .num{font-size:1.4em}
  .stat-box .label{font-size:0.75em}
  .event-card{padding:14px}
  .event-card .event-title{font-size:1em}
  .event-card .event-desc{font-size:0.85em}
  .choice-btn{padding:14px;font-size:0.9em}
  .choice-btn .choice-label{font-size:0.95em}
  .choice-btn .choice-desc{font-size:0.85em}
  .match-info{font-size:0.8em}
  .opponent-name{font-size:1.1em}
  .btn-start{padding:14px 32px;font-size:0.95em;width:90%;max-width:400px}
  .btn-next{padding:14px 28px;font-size:0.9em;width:90%;max-width:400px}
  .btn-confirm{padding:12px 28px;font-size:0.9em;width:90%;max-width:400px}
  .score{font-size:2em}
  .match-header{flex-direction:column;align-items:flex-start}
  .final-result{padding:20px 10px}
  .final-result h2{font-size:1.3em}
  .final-result p{font-size:0.85em}
  .sel-info{font-size:0.85em}
  .coach-tag{font-size:0.8em}
  table{font-size:0.8em}
  th,td{padding:8px 5px}
}
@media(max-width:420px){
  body{font-size:13px}
  .container{padding:8px}
  .header h1{font-size:1.3em}
  .stat-box{min-width:42%;padding:8px 6px}
  .stat-box .num{font-size:1.2em}
  .stat-box .label{font-size:0.7em}
  .panel{padding:12px}
  .choice-btn{padding:12px 10px;font-size:0.85em}
  .btn-start,.btn-next,.btn-confirm{width:95%}
  .score{font-size:1.6em}
  .final-result h2{font-size:1.1em}
  table{font-size:0.75em}
  th,td{padding:6px 4px}
}
</style>

<script>
/*
 * ToBid H5 rewarded-video bridge.
 *
 * This file only wraps the App WebView bridge methods:
 * adRequest, preLoadVideo and connectVideo.
 *
 * Business rules such as "unlock after 8 seconds" should live in each game page,
 * because different games may use different reward policies.
 */
(function (root) {
  "use strict";

  var DEFAULTS = {
    adUrl: "https://ap.dongqiudi.com/plat/v3",
    pgid: "1.15.2",
    origin: "tobid",
    sdkId: "6362731749334746",
    sceneId: "leagueCollect_14",
    data: {},
    bridgeTimeout: 5000,
    // Some native bridge methods do not callback reliably; keep this short so
    // the page layer can recover, retry or apply its own fallback policy.
    callbackTimeout: 8000,
    onLog: null
  };

  function extend(target) {
    var i;
    var key;
    var source;
    target = target || {};
    for (i = 1; i < arguments.length; i += 1) {
      source = arguments[i] || {};
      for (key in source) {
        if (Object.prototype.hasOwnProperty.call(source, key)) {
          target[key] = source[key];
        }
      }
    }
    return target;
  }

  function isFunction(value) {
    return typeof value === "function";
  }

  function toError(error) {
    if (error instanceof Error) return error;
    return new Error(String(error || "unknown error"));
  }

  function safeJsonParse(value) {
    if (typeof value !== "string") return value;
    try {
      return JSON.parse(value);
    } catch (error) {
      return value;
    }
  }

  function unwrapNativeResponse(response) {
    var body = response && response._responseWrapedByNative ? response._responseWrapedByNative : response;
    return safeJsonParse(body);
  }

  function findRewardAd(body) {
    var data = body;
    var i;
    if (body && Object.prototype.toString.call(body.data) === "[object Array]") {
      data = body.data;
    }
    if (Object.prototype.toString.call(data) !== "[object Array]") return null;
    for (i = 0; i < data.length; i += 1) {
      if (data[i] && data[i].ad_type === "sdk_rewarded_video") {
        return data[i];
      }
    }
    return null;
  }

  function ensureBridgeConnector() {
    if (root.connectWebViewJavascriptBridge) return;

    root.connectWebViewJavascriptBridge = function (callback) {
      var iframe;

      if (root.WebViewJavascriptBridge) {
        if (!root.WebViewJavascriptBridge._messageHandler && root.WebViewJavascriptBridge.init) {
          root.WebViewJavascriptBridge.init(function () {});
        }
        callback(root.WebViewJavascriptBridge);
        return;
      }

      document.addEventListener("WebViewJavascriptBridgeReady", function () {
        if (root.WebViewJavascriptBridge && !root.WebViewJavascriptBridge._messageHandler && root.WebViewJavascriptBridge.init) {
          root.WebViewJavascriptBridge.init(function () {});
        }
        callback(root.WebViewJavascriptBridge);
      }, false);

      if (root.WVJBCallbacks) {
        root.WVJBCallbacks.push(callback);
        return;
      }

      root.WVJBCallbacks = [callback];
      iframe = document.createElement("iframe");
      iframe.style.display = "none";
      iframe.src = "https://__bridge_loaded__";
      document.documentElement.appendChild(iframe);
      setTimeout(function () {
        if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
      }, 0);
    };
  }

  function RewardVideoBridge(options) {
    this.options = extend({}, DEFAULTS, options || {});
    this.currentPayload = null;
  }

  RewardVideoBridge.prototype.log = function (title, data) {
    if (isFunction(this.options.onLog)) {
      this.options.onLog(title, data);
    }
    if (root.console && root.console.log) {
      root.console.log("[RewardVideoBridge] " + title, data || "");
    }
  };

  RewardVideoBridge.prototype.getBridge = function (callback) {
    var self = this;
    var done = false;
    var timer;

    ensureBridgeConnector();

    timer = setTimeout(function () {
      if (done) return;
      done = true;
      callback(new Error("未检测到 WebViewJavascriptBridge"));
    }, this.options.bridgeTimeout);

    root.connectWebViewJavascriptBridge(function (bridge) {
      if (done) return;
      done = true;
      clearTimeout(timer);
      if (bridge && bridge.callHandler) {
        self.log("bridge ready");
        callback(null, bridge);
      } else {
        callback(new Error("桥对象存在，但没有 callHandler 方法"));
      }
    });
  };

  RewardVideoBridge.prototype.callHandler = function (name, params, callback) {
    var self = this;
    var cb = isFunction(callback) ? callback : function () {};

    this.log("callHandler: " + name, params);
    this.getBridge(function (bridgeError, bridge) {
      var done;
      var timer;

      if (bridgeError) {
        self.log(name + " bridge error", { message: bridgeError.message });
        cb(bridgeError);
        return;
      }

      done = false;
      timer = setTimeout(function () {
        if (done) return;
        done = true;
        self.log(name + " callback timeout");
        cb(null, null, { timeout: true });
      }, self.options.callbackTimeout);

      try {
        bridge.callHandler(name, params || {}, function (response) {
          if (done) return;
          done = true;
          clearTimeout(timer);
          self.log(name + " callback", response);
          cb(null, response, { timeout: false });
        });
      } catch (error) {
        if (done) return;
        done = true;
        clearTimeout(timer);
        self.log(name + " call error", { message: error.message });
        cb(error);
      }
    });
  };

  RewardVideoBridge.prototype.detectBridge = function (callback) {
    this.getBridge(function (error) {
      if (isFunction(callback)) callback(error || null);
    });
  };

  RewardVideoBridge.prototype.buildDefaultPayload = function (options) {
    var opts = extend({}, this.options, options || {});
    if (!opts.sdkId && !opts.sdk_id) {
      throw new Error("缺少 sdkId，无法请求激励视频广告位");
    }
    return {
      origin: opts.origin || "",
      sdk_id: opts.sdk_id || opts.sdkId,
      imp_mon_arr: opts.imp_mon_arr || opts.impMonArr || [],
      click_mon_arr: opts.click_mon_arr || opts.clickMonArr || [],
      ct: opts.ct || "",
      pgid: opts.pgid || this.options.pgid
    };
  };

  RewardVideoBridge.prototype.setPayload = function (payload) {
    this.currentPayload = extend({}, payload || {});
    return this.currentPayload;
  };

  RewardVideoBridge.prototype.getPayload = function () {
    return this.currentPayload;
  };

  RewardVideoBridge.prototype.preloadPayload = function (payload, callback) {
    var finalPayload = this.setPayload(payload);
    this.callHandler("preLoadVideo", finalPayload, callback);
  };

  RewardVideoBridge.prototype.preload = function (options, callback) {
    var payload;
    var cb = callback;
    if (isFunction(options)) {
      cb = options;
      options = {};
    }

    try {
      payload = this.buildDefaultPayload(options);
    } catch (error) {
      if (isFunction(cb)) cb(toError(error));
      return;
    }

    this.preloadPayload(payload, cb);
  };

  RewardVideoBridge.prototype.loadFromConfig = function (options, callback) {
    var self = this;
    var opts = options || {};
    var cb = callback;

    if (isFunction(options)) {
      cb = options;
      opts = {};
    }

    this.callHandler("adRequest", {
      method: "get",
      url: opts.adUrl || this.options.adUrl,
      param: {
        pgid: opts.pgid || this.options.pgid
      }
    }, function (error, response) {
      var body;
      var ad;
      var payload;

      if (error) {
        if (isFunction(cb)) cb(error);
        return;
      }

      body = unwrapNativeResponse(response);
      self.log("adRequest unwrapped", body);
      ad = findRewardAd(body);
      if (!ad) {
        if (isFunction(cb)) cb(new Error("adRequest 没找到 ad_type=sdk_rewarded_video 的广告"));
        return;
      }

      payload = {
        origin: ad.ad_source && ad.ad_source.sdk_origin,
        sdk_id: ad.ad_source && ad.ad_source.sdk_position_id,
        imp_mon_arr: ad.imp_mon_arr || [],
        click_mon_arr: ad.click_mon_arr || [],
        ct: "",
        pgid: opts.pgid || self.options.pgid
      };

      if (!payload.sdk_id) {
        if (isFunction(cb)) cb(new Error("广告配置里没有 ad_source.sdk_position_id"));
        return;
      }

      self.preloadPayload(payload, function (preloadError, preloadResponse, meta) {
        if (isFunction(cb)) cb(preloadError || null, payload, preloadResponse, meta);
      });
    });
  };

  RewardVideoBridge.prototype.show = function (options, callback) {
    var opts = options || {};
    var cb = callback;
    var base;
    var payload;

    if (isFunction(options)) {
      cb = options;
      opts = {};
    }

    try {
      base = this.currentPayload || this.buildDefaultPayload(opts);
      payload = extend({
        id: opts.id || opts.sceneId || this.options.sceneId,
        data: opts.data || this.options.data || {}
      }, base);
    } catch (error) {
      if (isFunction(cb)) cb(toError(error));
      return;
    }

    this.callHandler("connectVideo", payload, cb);
  };

  RewardVideoBridge.prototype.preloadThenShow = function (options, callback) {
    var self = this;
    var opts = options || {};
    var cb = callback;

    if (isFunction(options)) {
      cb = options;
      opts = {};
    }

    this.preload(opts, function (error) {
      if (error) {
        if (isFunction(cb)) cb(error);
        return;
      }
      self.show(opts, cb);
    });
  };

  RewardVideoBridge.prototype.loadFromConfigThenShow = function (options, callback) {
    var self = this;
    var opts = options || {};
    var cb = callback;

    if (isFunction(options)) {
      cb = options;
      opts = {};
    }

    this.loadFromConfig(opts, function (error) {
      if (error) {
        if (isFunction(cb)) cb(error);
        return;
      }
      self.show(opts, cb);
    });
  };

  root.RewardVideoBridge = {
    create: function (options) {
      return new RewardVideoBridge(options);
    },
    Constructor: RewardVideoBridge
  };
})(window);

var SCORER_WEIGHTS=[22,20,18,10,6,6,5,4,4,3,2];

function pickScorer(){
  var total=0;for(var i=0;i<SCORER_WEIGHTS.length;i++)total+=SCORER_WEIGHTS[i];
  var r=Math.random()*total;var cum=0;
  for(var i=0;i<SPURS_SCORERS.length;i++){cum+=SCORER_WEIGHTS[i];if(r<cum)return SPURS_SCORERS[i];}
  return SPURS_SCORERS[0];
}

function genScorers(goals){
  var scorers=[];
  for(var i=0;i<goals;i++){
    var name=pickScorer();
    var found=false;
    for(var j=0;j<scorers.length;j++){if(scorers[j].name===name){scorers[j].count++;found=true;break;}}
    if(!found)scorers.push({name:name,count:1});
  }
  return scorers.map(function(s){return s.count>1?s.name+'('+s.count+')':s.name;}).join(' / ');
}

function simulateMatch(diff,atkMod,defMod){
  var home=MATCHES[G.matchIndex].home?3:0;
  var base=52-diff*5+atkMod*0.3+defMod*0.2+G.morale*0.08+home;
  var w=clamp(base,15,50);var d=clamp(22+defMod*0.15-atkMod*0.05,8,28);
  var l=100-w-d;if(l<15){var excess=15-l;w-=excess*0.6;d-=excess*0.4;l=15;}
  var r=Math.random()*100;
  if(r<w)return'win';if(r<w+d)return'draw';return'loss';
}
function genScore(res){
  if(res==='win'){var s=Math.random()<0.6?1:Math.random()<0.7?2:3;return[s+1,Math.floor(Math.random()*s)]}
  if(res==='draw'){var s=Math.random()<0.5?1:Math.random()<0.7?2:0;return[s,s]}
  var c=Math.random()<0.5?1:Math.random()<0.7?2:3;return[Math.floor(Math.random()*c),c+1];
}
function simOneMatch(h,a){
  var hStr=h.pts/75,aStr=a.pts/75;
  var hWin=clamp(0.33+(hStr-aStr)*0.35+0.08,0.12,0.55);
  var drw=0.27;
  var aWin=clamp(1-hWin-drw,0.12,0.55);
  var tot=hWin+drw+aWin;hWin/=tot;drw/=tot;
  var r=Math.random();var hg,ag;
  h.p++;a.p++;
  if(r<hWin){hg=1+Math.floor(Math.random()*3);ag=Math.floor(Math.random()*hg);h.w++;h.pts+=3;a.l++;}
  else if(r<hWin+drw){hg=Math.floor(Math.random()*3);ag=hg;h.d++;h.pts+=1;a.d++;a.pts+=1;}
  else{ag=1+Math.floor(Math.random()*3);hg=Math.floor(Math.random()*ag);a.w++;a.pts+=3;h.l++;}
  h.gf+=hg;h.ga+=ag;a.gf+=ag;a.ga+=hg;
  return{hg:hg,ag:ag};
}

function simRivals(oppName,spursResult,spursGF,spursGC){
  G.roundResults=[];
  var opp=leagueTable.find(function(t){return t.name===oppName});
  if(opp){
    opp.p++;opp.gf+=spursGC;opp.ga+=spursGF;
    if(spursResult==='win')opp.l++;
    else if(spursResult==='draw'){opp.d++;opp.pts+=1;}
    else{opp.w++;opp.pts+=3;}
  }
  // 固定赛程：本轮保级对手比赛
  var fixtures=RIVAL_FIXTURES[G.matchIndex]||[];
  var played={};
  for(var i=0;i<fixtures.length;i++){
    var f=fixtures[i];
    if(f.h===oppName||f.a===oppName)continue;
    var ht=leagueTable.find(function(t){return t.name===f.h});
    var at=leagueTable.find(function(t){return t.name===f.a});
    if(!ht||!at)continue;
    var sc=simOneMatch(ht,at);
    G.roundResults.push({home:f.h,away:f.a,hg:sc.hg,ag:sc.ag});
    played[f.h]=true;played[f.a]=true;
  }
  // 其余未参与固定赛程的球队随机配对
  var pool=[];
  for(var i=0;i<leagueTable.length;i++){
    var t=leagueTable[i];
    if(t.isSpurs||t.name===oppName||played[t.name])continue;
    pool.push(t);
  }
  shuffle(pool);
  for(var i=0;i<pool.length-1;i+=2){
    var sc=simOneMatch(pool[i],pool[i+1]);
    G.roundResults.push({home:pool[i].name,away:pool[i+1].name,hg:sc.hg,ag:sc.ag});
  }
}

function selectChoice(eIdx,cIdx){
  G.selChoice=cIdx;

  document.getElementById('cb'+cIdx).classList.add('selected');
  var info=document.getElementById('selInfo');
  info.style.display='block';
  info.innerHTML='你选择了：<span>'+e.choices[cIdx].label+'</span>';
  document.getElementById('confirmBtn').style.display='inline-block';
}

function confirmChoice(eIdx){
  if(G.selChoice<0)return;
  var e=G.currentEvents[eIdx];
  var c=e.choices[G.selChoice];
  var eff=c.effect;
  G.atkMod+=Math.round((eff.attack||0)*0.7);
  G.defMod+=Math.round((eff.defense||0)*0.7);
  G.morale=clamp(G.morale+Math.round((eff.morale||0)*0.8),0,100);
  if(eff.injuryRisk&&Math.random()<eff.injuryRisk){
    var p=eff.injuryPenalty;
    G.atkMod+=(p.attack||0);
    G.defMod+=(p.defense||0);
    G.morale=clamp(G.morale+(p.morale||0),0,100);
  }
  renderEvent(eIdx+1);
}

function watchRewardForReroll(){

function nextMatch(){

function simCatchUp(){
  var maxP=0;
  for(var i=0;i<leagueTable.length;i++){if(leagueTable[i].p>maxP)maxP=leagueTable[i].p}
  var behind=[];
  for(var i=0;i<leagueTable.length;i++){
    if(leagueTable[i].p<maxP)behind.push(leagueTable[i]);
  }
  if(behind.length<2)return;
  for(var i=0;i<behind.length-1;i+=2){
    var h=behind[i],a=behind[i+1];
    var hStr=h.pts/75,aStr=a.pts/75;
    var hWin=clamp(0.33+(hStr-aStr)*0.35+0.08,0.12,0.55);
    var drw=0.27;
    var aWin=clamp(1-hWin-drw,0.12,0.55);
    var tot=hWin+drw+aWin;hWin/=tot;drw/=tot;
    var r=Math.random();
    h.p++;a.p++;
    var hg,ag;
    if(r<hWin){hg=1+Math.floor(Math.random()*3);ag=Math.floor(Math.random()*hg);h.w++;h.pts+=3;a.l++}
    else if(r<hWin+drw){hg=Math.floor(Math.random()*3);ag=hg;h.d++;h.pts+=1;a.d++;a.pts+=1}
    else{ag=1+Math.floor(Math.random()*3);hg=Math.floor(Math.random()*ag);a.w++;a.pts+=3;h.l++}
    h.gf+=hg;h.ga+=ag;a.gf+=ag;a.ga+=hg;
  }
  if(behind.length%2===1){
    var t=behind[behind.length-1];
    var r=Math.random();
    t.p++;
    if(r<0.4){var gf=1+Math.floor(Math.random()*2);var ga=Math.floor(Math.random()*gf);t.w++;t.pts+=3;t.gf+=gf;t.ga+=ga}
    else if(r<0.7){var g=Math.floor(Math.random()*3);t.d++;t.pts+=1;t.gf+=g;t.ga+=g}
    else{var ga=1+Math.floor(Math.random()*2);var gf=Math.floor(Math.random()*ga);t.l++;t.gf+=gf;t.ga+=ga}
  }
}
